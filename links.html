<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doodle History — all links</title>
<meta name="description" content="Watch Doodle History on YouTube and follow on TikTok, Instagram, and Facebook.">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<style>
  .hub{max-width:520px;margin:0 auto;padding:38px 22px 60px;text-align:center}
  .hub img.logo{width:104px;height:104px;border-radius:50%;border:3px solid var(--line)}
  .hub h1{font-size:30px;margin:16px 0 4px}
  .hub p.tag{color:var(--muted);margin:0 0 26px}
  .links{display:flex;flex-direction:column;gap:14px}
  .lnk{display:flex;align-items:center;justify-content:center;gap:10px;
    border:2px solid var(--line);border-radius:14px;padding:15px 18px;
    font-weight:800;font-size:17px;text-decoration:none;color:var(--ink);background:var(--card);
    transition:transform .06s ease, box-shadow .06s ease}
  .lnk:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--line)}
  .lnk.primary{background:var(--red);color:#fff}
  .lnk small{display:block;font-weight:600;font-size:12.5px;opacity:.8}
  .hub footer{margin-top:30px;font-size:13px;color:var(--muted)}
  .hub footer a{color:var(--ink)}
</style>
</head>
<body>
<div class="hub">
  <img class="logo" src="logo.png" alt="Doodle History">
  <h1>Doodle History</h1>
  <p class="tag">True stories from history, doodled.</p>

  <div class="links">
    <a class="lnk primary" href="https://www.youtube.com/@doodlehistoryhq">
      ▶ Watch full episodes on YouTube
    </a>
    <a class="lnk" href="https://youtu.be/ZFIcwb2HH4g">

      Instagram <small>@doodlehistoryhq</small>
    </a>
    <a class="lnk" href="https://www.tiktok.com/@doodlehistoryhq">
      TikTok <small>@doodlehistoryhq</small>
    </a>
    <a class="lnk" href="https://www.facebook.com/profile.php?id=61591246298585">
      Facebook <small>Doodle History</small>
    </a>
  </div>

  <footer>
    <a href="index.html">About</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>
  </footer>
</div>

</html>
